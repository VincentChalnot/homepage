<section id="projects">
  <div class="section-container">
    <p class="section-title">{{ i18n "projects.title" }}</p>
    <h2 class="section-heading">{{ .Params.heading }}</h2>
    <div class="grid sm:grid-cols-2 gap-6">
      {{ range .Params.items }}
      <div class="card group flex flex-col">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-2 h-2 rounded-full bg-neon"></div>
          <h3 class="text-lg font-semibold text-white group-hover:text-neon transition-colors">{{ .name }}</h3>
        </div>
        <p class="text-gray-400 text-sm leading-relaxed flex-1">{{ .description }}</p>
        <div class="mt-4 flex flex-wrap gap-2">
          {{ range .tech }}
          <span class="tag">{{ . }}</span>
          {{ end }}
        </div>
        {{ if .url }}
        <a href="{{ .url }}" target="_blank" rel="noopener noreferrer" class="mt-4 inline-flex items-center gap-1 text-sm text-neon hover:text-neon-glow transition-colors font-mono">
          {{ i18n "projects.view_project" }}
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        </a>
        {{ end }}
      </div>
      {{ end }}
    </div>
  </div>
</section>
