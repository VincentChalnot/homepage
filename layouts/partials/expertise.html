<section id="expertise">
  <div class="section-container">
    <p class="section-title">{{ i18n "expertise.title" }}</p>
    <h2 class="section-heading">{{ .Params.heading }}</h2>
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
      {{ range .Params.skills }}
      <div class="card group">
        <h3 class="text-lg font-semibold text-white mb-3 group-hover:text-neon transition-colors">{{ .category }}</h3>
        <p class="text-gray-400 text-sm leading-relaxed">{{ .items }}</p>
      </div>
      {{ end }}
    </div>
  </div>
</section>
