{{ define "main" }}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="w-full max-w-md mx-auto px-4">
    <div class="card p-8 sm:p-10">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-neon/10 border border-neon/20 mb-5">
          <svg class="w-7 h-7 text-neon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
          </svg>
        </div>
        <h2 class="text-xl font-semibold text-white font-mono">Admin Panel</h2>
        <p class="text-gray-500 text-sm mt-1 font-mono">Restricted access</p>
      </div>

      <form method="POST" action="" class="space-y-5" id="login-form">
        <div>
          <label for="username" class="block text-xs font-mono text-neon-dim uppercase tracking-wider mb-1.5">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            autocomplete="off"
            class="w-full bg-pcb-bg border border-pcb-trace/60 rounded-lg px-4 py-2.5 text-gray-200 placeholder-gray-600 font-mono text-sm focus:border-neon focus:outline-none focus:ring-1 focus:ring-neon/30 transition-colors"
            placeholder="admin"
          />
        </div>
        <div>
          <label for="password" class="block text-xs font-mono text-neon-dim uppercase tracking-wider mb-1.5">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="off"
            class="w-full bg-pcb-bg border border-pcb-trace/60 rounded-lg px-4 py-2.5 text-gray-200 placeholder-gray-600 font-mono text-sm focus:border-neon focus:outline-none focus:ring-1 focus:ring-neon/30 transition-colors"
            placeholder="••••••••"
          />
        </div>
        <button type="submit" class="w-full btn-primary justify-center font-mono text-sm tracking-wide">
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
<style>
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
</style>
<script>
  (function() {
    if (sessionStorage.getItem('login_error')) {
      sessionStorage.removeItem('login_error');
      const btn = document.querySelector('button[type="submit"]');
      const error = document.createElement('div');
      error.className = 'text-red-400 text-xs font-mono text-center mt-3';
      error.textContent = 'Invalid credentials';
      btn.parentNode.insertBefore(error, btn.nextSibling);
    }
    document.getElementById('login-form').addEventListener('submit', function() {
      sessionStorage.setItem('login_error', '1');
    });
  })();
</script>
{{ end }}
